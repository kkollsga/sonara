name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            cargo-features: ""
          - os: macos-latest
            cargo-features: --features accelerate
          - os: windows-latest
            cargo-features: ""
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Rust tests
        run: cargo test -p canora ${{ matrix.cargo-features }}

      - name: Build Python bindings
        if: matrix.os != 'windows-latest'
        run: |
          pip install maturin numpy
          maturin develop --release -m canora-python/Cargo.toml

      - name: Python tests
        if: matrix.os != 'windows-latest'
        run: python tests/python/test_api.py

  publish:
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Get package version
        id: version
        run: |
          VERSION=$(grep '^version' canora-python/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if version exists on PyPI
        id: check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://pypi.org/pypi/canora/${{ steps.version.outputs.version }}/json/")
          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip — already published
        if: steps.check.outputs.exists == 'true'
        run: echo "Version ${{ steps.version.outputs.version }} already on PyPI"

      - name: Build sdist
        if: steps.check.outputs.exists == 'false'
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: -m canora-python/Cargo.toml --out dist

      - name: Publish sdist to PyPI
        if: steps.check.outputs.exists == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
