name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            cargo-features: ""
            venv-python: ./.venv/bin/python
          - os: macos-latest
            cargo-features: --features accelerate
            venv-python: ./.venv/bin/python
          - os: windows-latest
            cargo-features: ""
            venv-python: ./.venv/Scripts/python.exe
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Rust tests
        run: cargo test -p sonara ${{ matrix.cargo-features }}

      - name: Rust aggression-feature tests
        if: matrix.os == 'ubuntu-latest'
        run: cargo test -p sonara --features aggression

      - name: Build Python bindings
        env:
          VIRTUAL_ENV: ${{ github.workspace }}/.venv
        run: |
          python -m venv .venv
          ${{ matrix.venv-python }} -m pip install maturin numpy
          ${{ matrix.venv-python }} -m maturin develop --release -m sonara-python/Cargo.toml

      - name: Python tests
        run: ${{ matrix.venv-python }} scripts/run_python_tests.py

      - name: Fidelity routing
        if: matrix.os == 'ubuntu-latest'
        env:
          FIDELITY_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: ${{ matrix.venv-python }} scripts/run_fidelity_gate.py --base "$FIDELITY_BASE"

  build_wheels:
    name: wheel (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            os: ubuntu-latest
            python-version: "3.10"
            target: x86_64
            manylinux: "2014"
          - label: macos-x86_64
            os: macos-15-intel
            python-version: "3.12"
            target: x86_64-apple-darwin
            manylinux: "off"
          - label: macos-arm64
            os: macos-15
            python-version: "3.12"
            target: aarch64-apple-darwin
            manylinux: "off"
          - label: windows-x64
            os: windows-latest
            python-version: "3.12"
            target: x86_64-pc-windows-msvc
            manylinux: "off"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build abi3 wheel
        uses: PyO3/maturin-action@86b9d133d34bc1b40018696f782949dac11bd380
        with:
          maturin-version: v1.11.5
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --locked --compatibility pypi --out dist -m sonara-python/Cargo.toml
      - name: Smoke-install wheel
        run: python scripts/smoke_artifacts.py --artifact-dir dist --kind wheel
      - name: Upload verified wheel
        uses: actions/upload-artifact@v4
        with:
          name: release-wheel-${{ matrix.label }}
          path: dist/*.whl
          if-no-files-found: error

  build_sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist
        uses: PyO3/maturin-action@86b9d133d34bc1b40018696f782949dac11bd380
        with:
          maturin-version: v1.11.5
          command: sdist
          args: --out dist -m sonara-python/Cargo.toml
      - name: Smoke-install sdist
        run: python scripts/smoke_artifacts.py --artifact-dir dist --kind sdist
      - name: Upload verified sdist
        uses: actions/upload-artifact@v4
        with:
          name: release-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  collect_artifacts:
    name: collect verified release artifacts
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Download verified artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Verify exact artifact set
        run: python scripts/check_release_artifacts.py dist
      - name: Upload exact release set
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/*
          if-no-files-found: error

  publish:
    needs: [test, collect_artifacts]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Get package version
        id: version
        run: |
          VERSION=$(python -c "
          import tomllib, pathlib
          d = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          print(d['project']['version'])
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if version exists on PyPI
        id: check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://pypi.org/pypi/sonara/${{ steps.version.outputs.version }}/json/")
          if [ "$STATUS" = "200" ]; then
            echo "Published: version ${{ steps.version.outputs.version }} already on PyPI"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Not published: version ${{ steps.version.outputs.version }} not found on PyPI"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download verified release set
        if: steps.check.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist

      - name: Recheck exact artifact set
        if: steps.check.outputs.exists == 'false'
        run: python scripts/check_release_artifacts.py dist

      - name: Publish to PyPI
        if: steps.check.outputs.exists == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Tag and create GitHub release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          git tag "$VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" dist/* --generate-notes
